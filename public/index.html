<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Terminal Data Dashboard</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				padding: 20px;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
			}

			header {
				background: white;
				border-radius: 12px;
				padding: 24px;
				margin-bottom: 24px;
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
			}

			h1 {
				color: #333;
				margin-bottom: 20px;
				font-size: 28px;
			}

			.filter-section {
				position: relative;
				display: inline-block;
				width: 100%;
			}

			.filter-label {
				display: block;
				font-size: 14px;
				font-weight: 600;
				color: #555;
				margin-bottom: 8px;
			}

			.dropdown-container {
				position: relative;
			}

			.dropdown-button {
				width: 100%;
				padding: 12px 16px;
				background: #f5f5f5;
				border: 2px solid #ddd;
				border-radius: 8px;
				cursor: pointer;
				font-size: 14px;
				font-weight: 500;
				color: #333;
				display: flex;
				justify-content: space-between;
				align-items: center;
				transition: all 0.3s ease;
			}

			.dropdown-button:hover {
				border-color: #667eea;
				background: #fafafa;
			}

			.dropdown-button.active {
				border-color: #667eea;
				background: white;
				box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
			}

			.dropdown-arrow {
				transition: transform 0.3s ease;
				color: #667eea;
			}

			.dropdown-button.active .dropdown-arrow {
				transform: rotate(180deg);
			}

			.dropdown-menu {
				position: absolute;
				top: 100%;
				left: 0;
				right: 0;
				background: white;
				border: 2px solid #ddd;
				border-top: none;
				border-radius: 0 0 8px 8px;
				max-height: 400px;
				overflow-y: auto;
				z-index: 100;
				box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
				display: none;
			}

			.dropdown-menu.show {
				display: block;
			}

			.checkbox-item {
				display: flex;
				align-items: center;
				padding: 12px 16px;
				border-bottom: 1px solid #eee;
				transition: background 0.2s ease;
				cursor: pointer;
			}

			.checkbox-item:hover {
				background: #f9f9f9;
			}

			.checkbox-item:last-child {
				border-bottom: none;
			}

			.checkbox-item input[type="checkbox"] {
				margin-right: 12px;
				width: 18px;
				height: 18px;
				cursor: pointer;
				accent-color: #667eea;
			}

			.checkbox-label {
				flex: 1;
				cursor: pointer;
				user-select: none;
				color: #333;
				font-weight: 500;
			}

			.status-indicator {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				margin-left: 8px;
				background: #4caf50;
				animation: pulse 2s infinite;
			}

			@keyframes pulse {
				0%, 100% {
					opacity: 1;
				}
				50% {
					opacity: 0.5;
				}
			}

			.status-inactive {
				background: #999;
				animation: none;
			}

			.cards-container {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
				gap: 20px;
				grid-auto-rows: max-content;
			}

			@media (max-width: 768px) {
				.cards-container {
					grid-template-columns: 1fr;
				}

				h1 {
					font-size: 24px;
				}

				.dropdown-button {
					padding: 10px 12px;
					font-size: 13px;
				}
			}

			.card {
				background: white;
				border-radius: 12px;
				padding: 20px;
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
				animation: slideIn 0.3s ease-out;
				transition: all 0.3s ease;
				border-left: 4px solid #667eea;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(20px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.card:hover {
				box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
				transform: translateY(-2px);
			}

			.card-header {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				margin-bottom: 16px;
				padding-bottom: 12px;
				border-bottom: 2px solid #f0f0f0;
			}

			.card-title {
				font-size: 18px;
				font-weight: 700;
				color: #333;
				word-break: break-word;
			}

			.card-time {
				font-size: 12px;
				color: #999;
				white-space: nowrap;
				margin-left: 8px;
			}

			.card-body {
				display: flex;
				flex-direction: column;
				gap: 12px;
			}

			.data-row {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				gap: 12px;
				padding: 8px 0;
				border-bottom: 1px solid #f5f5f5;
			}

			.data-row:last-child {
				border-bottom: none;
				padding-bottom: 0;
			}

			.data-key {
				font-weight: 600;
				color: #667eea;
				font-size: 13px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				min-width: 100px;
			}

			.data-value {
				color: #555;
				word-break: break-all;
				text-align: right;
				font-family: 'Courier New', monospace;
				font-size: 13px;
				font-weight: 500;
			}

			.empty-state {
				grid-column: 1 / -1;
				text-align: center;
				padding: 60px 20px;
				color: white;
			}

			.empty-state h2 {
				font-size: 24px;
				margin-bottom: 8px;
			}

			.empty-state p {
				font-size: 16px;
				opacity: 0.8;
			}

			.loading {
				text-align: center;
				padding: 40px;
				color: white;
				font-size: 16px;
			}

			.connection-status {
				position: fixed;
				bottom: 20px;
				right: 20px;
				background: white;
				padding: 12px 16px;
				border-radius: 50px;
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 13px;
				font-weight: 600;
				z-index: 50;
			}

			.connection-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #4caf50;
				animation: pulse 2s infinite;
			}

			.connection-status.disconnected .connection-dot {
				background: #f44336;
				animation: none;
			}

			/* Profit/Loss Colors (Issue #5) */
			.value-positive {
				color: #2196f3 !important; /* Blue */
				font-weight: 700;
			}

			.value-negative {
				color: #f44336 !important; /* Red */
				font-weight: 700;
			}

		</style>
	</head>
	<body>
		<div class="container">
			<header>
				<h1>📊 Terminal Data Dashboard</h1>
				<div class="filter-section">
					<label class="filter-label">Filter Terminals</label>
					<div class="dropdown-container">
						<button class="dropdown-button" id="filterButton">
							<span id="filterText">Select terminals...</span>
							<span class="dropdown-arrow">▼</span>
						</button>
						<div class="dropdown-menu" id="dropdownMenu"></div>
					</div>
				</div>
			</header>

			<div class="cards-container" id="cardsContainer">
				<div class="loading">Menghubungkan ke server...</div>
			</div>
		</div>

		<div class="connection-status" id="connectionStatus">
			<div class="connection-dot"></div>
			<span id="connectionText">Terhubung</span>
		</div>

		<script>
			class DashboardManager {
				constructor() {
					this.ws = null;
					this.data = new Map();
					this.visibleTerminals = new Set();
					this.filterButton = document.getElementById('filterButton');
					this.dropdownMenu = document.getElementById('dropdownMenu');
					this.cardsContainer = document.getElementById('cardsContainer');
					this.connectionStatus = document.getElementById('connectionStatus');
					this.connectionText = document.getElementById('connectionText');
					this.filterText = document.getElementById('filterText');

					this.setupEventListeners();
					this.connect();
				}

				setupEventListeners() {
					this.filterButton.addEventListener('click', (e) => {
						e.stopPropagation();
						this.dropdownMenu.classList.toggle('show');
						this.filterButton.classList.toggle('active');
					});

					document.addEventListener('click', (e) => {
						if (!e.target.closest('.dropdown-container')) {
							this.dropdownMenu.classList.remove('show');
							this.filterButton.classList.remove('active');
						}
					});

					this.dropdownMenu.addEventListener('change', (e) => {
						if (e.target.type === 'checkbox') {
							const terminalId = e.target.value;
							if (e.target.checked) {
								this.visibleTerminals.add(terminalId);
							} else {
								this.visibleTerminals.delete(terminalId);
							}
							this.updateFilterText();
							this.render();
						}
					});
				}

				connect() {
					const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
					const wsUrl = `${protocol}//${window.location.host}/ws`;

					this.ws = new WebSocket(wsUrl);

					this.ws.onopen = () => {
						console.log('WebSocket terhubung');
						this.updateConnectionStatus(true);
					};

					this.ws.onmessage = (event) => {
						try {
							const message = JSON.parse(event.data);
							this.handleMessage(message);
						} catch (error) {
							console.error('Error parsing message:', error);
						}
					};

					this.ws.onerror = (error) => {
						console.error('WebSocket error:', error);
						this.updateConnectionStatus(false);
					};

					this.ws.onclose = () => {
						console.log('WebSocket disconnected');
						this.updateConnectionStatus(false);
						// Reconnect setelah 3 detik
						setTimeout(() => this.connect(), 3000);
					};
				}


				   handleMessage(message) {
					   // Jika message adalah objek dengan banyak channel
					   if (typeof message === 'object' && !Array.isArray(message) && Object.keys(message).every(k => typeof message[k] === 'object')) {
						   for (const [channel, data] of Object.entries(message)) {
							   const terminalId = channel || 'Unknown';
							   // Overwrite instead of merge to handle dynamic keys (Issue #5)
							   this.data.set(terminalId, {
								   ...data,
								   id: terminalId,
								   timestamp: new Date(data.updated_at || new Date())
							   });
							   if (!this.visibleTerminals.has(terminalId)) {
								   this.visibleTerminals.add(terminalId);
							   }
						   }
					   } else {
						   // Fallback: single channel
						   const { channel, ...data } = message;
						   const terminalId = channel || 'Unknown';
						   // Overwrite instead of merge to handle dynamic keys (Issue #5)
						   this.data.set(terminalId, {
							   ...data,
							   id: terminalId,
							   timestamp: new Date(data.updated_at || new Date())
						   });
						   if (!this.visibleTerminals.has(terminalId)) {
							   this.visibleTerminals.add(terminalId);
						   }
					   }

					   this.updateDropdown();
					   this.render();
				   }

				updateDropdown() {
					const terminals = Array.from(this.data.keys()).sort();
					const hasChecked = this.visibleTerminals.size > 0;

					// Clear existing items
					this.dropdownMenu.innerHTML = '';

					if (terminals.length === 0) {
						this.dropdownMenu.innerHTML = '<div style="padding: 12px 16px; color: #999; text-align: center;">Tidak ada terminal</div>';
						return;
					}

					terminals.forEach(terminalId => {
						const isVisible = this.visibleTerminals.has(terminalId);
						const isActive = this.data.get(terminalId)?.updated_at;

						const item = document.createElement('label');
						item.className = 'checkbox-item';

						const checkbox = document.createElement('input');
						checkbox.type = 'checkbox';
						checkbox.value = terminalId;
						checkbox.checked = isVisible;

						const label = document.createElement('span');
						label.className = 'checkbox-label';
						label.textContent = terminalId;

						const status = document.createElement('div');
						status.className = `status-indicator ${!isActive ? 'status-inactive' : ''}`;

						item.appendChild(checkbox);
						item.appendChild(label);
						item.appendChild(status);
						this.dropdownMenu.appendChild(item);
					});
				}

				updateFilterText() {
					const count = this.visibleTerminals.size;
					const total = this.data.size;

					if (count === 0) {
						this.filterText.textContent = 'Pilih terminal...';
					} else if (count === total) {
						this.filterText.textContent = `Semua ${total} terminal`;
					} else {
						this.filterText.textContent = `${count} dari ${total} terminal`;
					}
				}

				updateConnectionStatus(connected) {
					if (connected) {
						this.connectionStatus.classList.remove('disconnected');
						this.connectionText.textContent = 'Terhubung';
					} else {
						this.connectionStatus.classList.add('disconnected');
						this.connectionText.textContent = 'Terputus';
					}
				}

				formatTime(date) {
					const now = new Date();
					const diff = now - date;
					const seconds = Math.floor(diff / 1000);
					const minutes = Math.floor(seconds / 60);
					const hours = Math.floor(minutes / 60);

					if (seconds < 60) return 'Baru saja';
					if (minutes < 60) return `${minutes}m lalu`;
					if (hours < 24) return `${hours}h lalu`;
					return date.toLocaleDateString('id-ID', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
				}

				render() {
					const visibleData = Array.from(this.data.values())
						.filter(item => this.visibleTerminals.has(item.id))
						.sort((a, b) => b.timestamp - a.timestamp);

					if (this.data.size === 0) {
						this.cardsContainer.innerHTML = `
							<div class="empty-state">
								<h2>Menunggu data terminal...</h2>
								<p>Terminal akan muncul di sini ketika mengirim data</p>
							</div>
						`;
						return;
					}

					if (visibleData.length === 0) {
						this.cardsContainer.innerHTML = `
							<div class="empty-state">
								<h2>Tidak ada terminal yang dipilih</h2>
								<p>Pilih terminal dari filter di atas untuk melihat datanya</p>
							</div>
						`;
						return;
					}

					this.cardsContainer.innerHTML = visibleData.map(item => this.createCard(item)).join('');
				}

				createCard(item) {
					const dataRows = Object.entries(item)
						.filter(([key]) => !['id', 'timestamp', 'channel', 'updated_at'].includes(key))
						.map(([key, value]) => {
							const colorClass = this.getValueColorClass(key, value);
							return `
								<div class="data-row">
									<span class="data-key">${key}</span>
									<span class="data-value ${colorClass}">${this.formatValue(value)}</span>
								</div>
							`;
						})
						.join('');


					return `
						<div class="card">
							<div class="card-header">
								<span class="card-title">${item.id}</span>
								<span class="card-time">${this.formatTime(item.timestamp)}</span>
							</div>
							<div class="card-body">
								${dataRows || '<div style="color: #999; text-align: center; padding: 12px;">Tidak ada data</div>'}
							</div>
						</div>
					`;
				}

				   formatValue(value) {
					   if (Array.isArray(value)) {
						   return `<ul style="margin:0 0 0 18px;padding:0;">${value.map(v => `<li>${this.formatValue(v)}</li>`).join('')}</ul>`;
					   }
					   if (typeof value === 'object' && value !== null) {
						   return `<ul style="margin:0 0 0 18px;padding:0;">${Object.entries(value).map(([k, v]) => `<li><strong>${k}:</strong> ${this.formatValue(v)}</li>`).join('')}</ul>`;
					   }
					   if (typeof value === 'boolean') {
						   return value ? '✓' : '✗';
					   }
					   return String(value);
				   }

				   getValueColorClass(key, value) {
					   const targetKeys = ['profit_all', 'profit_today', 'floating'];
					   if (targetKeys.includes(key)) {
						   const num = parseFloat(value);
						   if (!isNaN(num)) {
							   if (num < 0) return 'value-negative';
							   if (num > 0) return 'value-positive';
						   }
					   }
					   return '';
				   }
			}


			// Initialize dashboard
			document.addEventListener('DOMContentLoaded', () => {
				new DashboardManager();
			});
		</script>
	</body>
</html>
